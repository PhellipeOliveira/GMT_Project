[pytest]
markers =
    slow: marca testes lentos (deselecionar com '-m "not slow"')
    unit: testes unitários (helpers e tools puras, sem I/O externo)
    supabase: testes que exigem conexão com o Supabase (DB)
    rag: testes do KB/RAG (ingestão, chunking e busca)
    intents: testes de classificação/roteamento de intents do agente GMT
    e2e: avaliação ponta-a-ponta do agente GMT (roteiros completos)
